version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mathclass-db
    environment:
      POSTGRES_USER: mathclass_user
      POSTGRES_PASSWORD: mathclass_secure_password_123
      POSTGRES_DB: mathclass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mathclass-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathclass_user -d mathclass"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: mathclass-api
    environment:
      DATABASE_URL: postgresql://mathclass_user:mathclass_secure_password_123@postgres:5432/mathclass
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mathclass-net
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mathclass-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:3001
    depends_on:
      - api
    networks:
      - mathclass-net

volumes:
  postgres_data:

networks:
  mathclass-net:
    driver: bridge
