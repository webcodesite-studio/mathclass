server {
    listen 80;
    server_name _;   # zmień na domenę np. mathclass.szkola.pl

    # Pliki frontendu (React build)
    root /var/www/mathclass/frontend;
    index index.html;

    # SPA routing — wszystkie ścieżki → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy do API backendu
    location /api/ {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # Statyczne pliki (uploadowane obrazki)
    location /uploads/ {
        alias /var/www/mathclass/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Bezpieczeństwo
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Rozmiar uploadu
    client_max_body_size 10M;
}
